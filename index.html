<title>AI分鏡創意故事</title>

<style>
    :root {
        --primary-color: #363f60;
        --secondary-color: #868887;
        --bg-color: #f4f6f8;
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: #333;
        margin: 0;
        padding: 20px;
    }

    h1 {
        color: var(--primary-color);
        margin-bottom: 10px;
    }

    p {
        margin-top: 0;
    }

    /* 按鈕區 */
    .controls {
        margin: 25px 0;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background-color: var(--primary-color);
        color: white;
        transition: 0.3s;
    }

    button:hover {
        background-color: #2a314b;
    }

    .secondary {
        background-color: var(--secondary-color);
    }

    .secondary:hover {
        background-color: #6d6e6e;
    }

    /* 主畫面 */
    #main-view {
        width: 100%;
        max-width: 1400px;
        margin: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 五張卡片區 */
    .storyboard {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
        margin-bottom: 30px;
    }

    /* 卡片 */
    .card-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 100%;
        aspect-ratio: 16 / 9;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        cursor: pointer;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .card.flipped {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 背面 */
    .card-back {
        background: linear-gradient(135deg,
            var(--primary-color),
            var(--secondary-color));
        color: white;
        font-size: 20px;
        font-weight: bold;
    }

    /* 正面 */
    .card-front {
        transform: rotateY(180deg);
        background: white;
    }

    .card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 左右移動按鈕 */
    .move-controls {
        display: flex;
        gap: 10px;
        margin-top: 12px;
    }

    .move-btn {
        width: 45px;
        height: 40px;
        border-radius: 8px;
        border: none;
        background: var(--primary-color);
        color: white;
        font-size: 18px;
        cursor: pointer;
    }

    .move-btn:hover {
        background: #2a314b;
    }

    /* 文字區 */
    textarea {
        width: 100%;
        max-width: 1000px;
        min-height: 200px;
        padding: 18px;
        border-radius: 12px;
        border: 2px solid #ddd;
        font-size: 16px;
        resize: vertical;
    }

    textarea:focus {
        outline: none;
        border-color: var(--primary-color);
    }

    /* 圖庫頁 */
    #gallery-view {
        display: none;
        width: 100%;
        max-width: 1400px;
        margin: auto;
        flex-direction: column;
        align-items: center;
    }

    .gallery-grid {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 18px;
        margin-top: 20px;
    }

    .gallery-item {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .gallery-item img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
    }

    .image-label {
        text-align: center;
        padding: 8px;
        font-size: 14px;
        background: #eee;
    }

    /* 手機版 */
    @media (max-width: 1200px) {
        .storyboard {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 700px) {
        .storyboard {
            grid-template-columns: 1fr;
        }
    }
</style>

<body>

```
<!-- 主畫面 -->
<div id="main-view">

    <h1>AI分鏡創意故事</h1>

    <p>
        抽出五張圖卡，自由調整順序後創作故事。
    </p>

    <!-- 按鈕 -->
    <div class="controls">

        <button id="btn-draw">
            重新抽卡
        </button>

        <button id="btn-gallery" class="secondary">
            所有圖庫
        </button>

    </div>

    <!-- 五張圖卡 -->
    <div class="storyboard" id="storyboard">

    </div>

    <!-- 文字輸入 -->
    <textarea
        placeholder="請依照圖片順序輸入你的故事..."
    ></textarea>

</div>

<!-- 圖庫頁 -->
<div id="gallery-view">

    <h1>全部圖庫</h1>

    <div class="controls">

        <button id="btn-back">
            返回首頁
        </button>

    </div>

    <!-- 圖庫 -->
    <div class="gallery-grid" id="gallery-grid">

    </div>

</div>

<script>

    // 設定
    const TOTAL_IMAGES = 36;
    const CARD_COUNT = 5;

    const IMAGE_EXT = '.jpg';

    const IMAGE_FOLDER = 'images/';

    // DOM
    const storyboard = document.getElementById('storyboard');

    const galleryGrid = document.getElementById('gallery-grid');

    const mainView = document.getElementById('main-view');

    const galleryView = document.getElementById('gallery-view');

    const btnDraw = document.getElementById('btn-draw');

    const btnGallery = document.getElementById('btn-gallery');

    const btnBack = document.getElementById('btn-back');

    // 圖片清單
    const imageList = [];

    for (let i = 1; i <= TOTAL_IMAGES; i++) {

        const num = String(i).padStart(2, '0');

        imageList.push(
            `${IMAGE_FOLDER}images_${num}${IMAGE_EXT}`
        );
    }

    // 隨機抽圖
    function drawRandomImages() {

        const shuffled =
            [...imageList].sort(() => 0.5 - Math.random());

        return shuffled.slice(0, CARD_COUNT);
    }

    // 建立五張圖卡
    function initStoryboard() {

        storyboard.innerHTML = '';

        const selectedImages = drawRandomImages();

        selectedImages.forEach((src) => {

            const cardContainer =
                document.createElement('div');

            cardContainer.className = 'card-container';

            cardContainer.innerHTML = `

                <div class="card">

                    <div class="card-face card-back">

                        點擊翻牌

                    </div>

                    <div class="card-face card-front">

                        <img src="${src}" alt="story">

                    </div>

                </div>

                <div class="move-controls">

                    <button class="move-btn"
                            onclick="moveCardLeft(this)">
                        ←
                    </button>

                    <button class="move-btn"
                            onclick="moveCardRight(this)">
                        →
                    </button>

                </div>
            `;

            // 翻牌
            const card =
                cardContainer.querySelector('.card');

            card.addEventListener('click', () => {

                if (!card.classList.contains('flipped')) {

                    card.classList.add('flipped');
                }
            });

            storyboard.appendChild(cardContainer);
        });
    }

    // 左移
    function moveCardLeft(button) {

        const cardContainer =
            button.closest('.card-container');

        const prev =
            cardContainer.previousElementSibling;

        if (prev) {

            storyboard.insertBefore(
                cardContainer,
                prev
            );
        }
    }

    // 右移
    function moveCardRight(button) {

        const cardContainer =
            button.closest('.card-container');

        const next =
            cardContainer.nextElementSibling;

        if (next) {

            storyboard.insertBefore(
                next,
                cardContainer
            );
        }
    }

    // 建立圖庫
    function initGallery() {

        galleryGrid.innerHTML = '';

        imageList.forEach((src, index) => {

            const num =
                String(index + 1).padStart(2, '0');

            const item =
                document.createElement('div');

            item.className = 'gallery-item';

            item.innerHTML = `

                <img src="${src}" alt="gallery">

                <div class="image-label">

                    images_${num}

                </div>
            `;

            galleryGrid.appendChild(item);
        });
    }

    // 顯示圖庫
    btnGallery.addEventListener('click', () => {

        mainView.style.display = 'none';

        galleryView.style.display = 'flex';
    });

    // 返回首頁
    btnBack.addEventListener('click', () => {

        galleryView.style.display = 'none';

        mainView.style.display = 'flex';
    });

    // 重新抽卡
    btnDraw.addEventListener('click', () => {

        initStoryboard();
    });

    // 預設載入
    window.onload = () => {

        initStoryboard();

        initGallery();
    };

</script>
```
