<!DOCTYPE html>

<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>圖卡說故事創意發揮</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 首頁 -->

  <div id="homePage">

```
<header class="header">

  <h1>圖卡說故事創意發揮</h1>

  <p>
    隨機抽取五張圖卡，自由排列順序後創作故事。
  </p>

</header>

<!-- 按鈕區 -->
<div class="button-group">

  <button onclick="drawCards()">
    抽五張圖卡
  </button>

  <button onclick="showGallery()">
    所有圖庫
  </button>

</div>

<!-- 五張圖卡 -->
<div id="cardsWrapper" class="cards-wrapper">

  <!-- 卡片1 -->
  <div class="card-block">

    <div class="card">

      <div class="card-inner">

        <!-- 背面 -->
        <div class="card-front">

          點擊翻牌

        </div>

        <!-- 正面 -->
        <div class="card-back">

          <img src="" alt="圖卡">

        </div>

      </div>

    </div>

    <div class="card-controls">

      <button>← 前移</button>

      <button>後移 →</button>

    </div>

  </div>

</div>

<!-- 文字故事區 -->
<div class="story-section">

  <h2>故事創作區</h2>

  <textarea
    placeholder="依照圖卡順序輸入你的故事..."
  ></textarea>

</div>
```

  </div>

  <!-- 圖庫頁 -->

  <div id="galleryPage" style="display:none;">

```
<header class="header">

  <h1>所有圖庫</h1>

</header>

<div class="button-group">

  <button onclick="backHome()">
    返回首頁
  </button>

</div>

<!-- 全部圖片 -->
<div id="galleryGrid" class="gallery-grid"></div>
```

  </div>

  <!-- 載入 JS -->

  <script src="script.js"></script>

</body>

</html>
