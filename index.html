<!-- 標題 -->
<header class="header">

  <h1>圖卡說故事創意發揮</h1>

  <p>
    抽出五張圖卡，自由排列順序後創作故事。
  </p>

</header>

<div class="button-group">

    所有圖庫
  </button>

</div>
