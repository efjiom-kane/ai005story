<!DOCTYPE html>

<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>圖卡說故事創意發揮</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 首頁 -->

  <div id="homePage">

```
<!-- 標題 -->
<header class="header">

  <h1>圖卡說故事創意發揮</h1>

  <p>
    抽出五張圖卡，自由排列順序後創作故事。
  </p>

</header>

<!-- 功能按鈕 -->
<div class="button-group">

  <!-- 抽卡 -->
  <button onclick="drawCards()">
    抽五張圖卡
  </button>

  <!-- 全部圖庫 -->
  <button onclick="showGallery()">
    所有圖庫
  </button>

</div>

<!-- 五張圖卡區 -->
<div id="cardsWrapper" class="cards-wrapper">

  <!-- JS 會自動生成五張圖卡 -->

</div>

<!-- 故事輸入 -->
<section class="story-section">

  <h2>故事創作區</h2>

  <textarea
    placeholder="依照圖卡順序輸入故事..."
  ></textarea>

</section>
```

  </div>

  <!-- 圖庫頁 -->

  <div id="galleryPage" style="display:none;">

```
<header class="header">

  <h1>所有圖庫</h1>

</header>

<div class="button-group">

  <button onclick="backHome()">
    返回首頁
  </button>

</div>

<!-- 全圖庫 -->
<div id="galleryGrid" class="gallery-grid"></div>
```

  </div>

  <!-- JS -->

  <script src="script.js"></script>

</body>

</html>
